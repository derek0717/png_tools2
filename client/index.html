<!DOCTYPE html>
<html>
<head>
    <title>PNG Tool</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f7f7f7;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background: white;
            padding: 24px 28px;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            width: 320px;
        }

        h2 {
            margin-top: 0;
            margin-bottom: 16px;
            font-size: 18px;
        }

        input {
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
            border-radius: 6px;
            border: 1px solid #ccc;
            margin-bottom: 12px;
            font-size: 14px;
        }

        button {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            margin-bottom: 10px;
            transition: all 0.2s;
            background: #007aff;
            color: white;
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .progress-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 20px 0 10px;
            padding: 0 10px;
        }

        .step {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            z-index: 2;
        }

        .circle {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: #e0e0e0;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 12px;
            font-weight: bold;
            transition: background-color 0.4s ease;
        }

        .label {
            font-size: 11px;
            color: #888;
            margin-top: 6px;
            font-weight: 500;
            transition: color 0.4s ease;
        }

        .line {
            flex-grow: 1;
            height: 3px;
            background: #e0e0e0;
            margin: 0 4px;
            position: relative;
            top: -10px;
            z-index: 1;
        }

        .line.completed {
            background: #34c759;
            transition: background-color 0.4s ease;
        }

        .step.active .circle {
            background: #007aff;
            box-shadow: 0 0 8px rgba(0, 122, 255, 0.4);
        }

        .step.active .label {
            color: #007aff;
            font-weight: bold;
        }

        .step.completed .circle {
            background: #34c759;
        }

        .step.completed .label {
            color: #34c759;
        }

        .line.completed {
            background: #34c759;
            transition: background-color 0.4s ease;
        }

        .status {
            font-size: 13px;
            color: #555;
            margin-top: 10px;
            min-height: 18px;
            text-align: center;
        }
        #downloadArea {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        #downloadArea span {
            font-size: 13px;
            color: #007aff;
            text-decoration: underline;
            cursor: pointer;
        }
        #downloadArea span.previous {
            color: #888;
        }

        .loading { color: #007aff; }
        .success { color: green; }
        .error { color: red; }

        .adv{
            margin-top: 15px;
            .adv-toggle {
                font-size: 11px;
                text-align: right;
                color: #888;
                cursor: pointer;
                text-decoration: underline;
                user-select: none;
            }

            .adv-panel {
                display: none;
                grid-template-columns: 1fr 1fr;
                gap: 8px;
                margin-top: 10px;
                border-top: 1px dashed #ccc;
                padding-top: 12px;
            }

            .adv-panel button {
                background: #5856d6;
                font-size: 12px;
                padding: 8px;
            }
            .adv-panel button:disabled{
                background: #ccc;
            }
        }
    </style>
</head>
<body>

<div class="card">
    <h2>PNG Tool</h2>

    <input id="id" placeholder="Line Pack ID" />

    <button id="generateBtn" onclick="doPack()" disabled="disabled">Generate</button>

    <div class="progress-container">
        <div class="step" id="step1">
            <div class="circle">1</div>
            <div class="label">Download</div>
        </div>
        <div class="line" id="line1"></div>
        <div class="step" id="step2">
            <div class="circle">2</div>
            <div class="label">Package</div>
        </div>
        <div class="line" id="line2"></div>
        <div class="step" id="step3">
            <div class="circle">✓</div>
            <div class="label">Complete</div>
        </div>
    </div>

    <div id="status" class="status"></div>
    <div id="downloadArea"></div>
    <div class="adv">
        <div class="adv-panel" id="advPanel">
            <button id="advDownloadBtn" onclick="manualDownload()" disabled="disabled">Download</button>
            <button id="advPackageBtn" onclick="manualPackage()" disabled="disabled">Package</button>
        </div>
        <div class="adv-toggle" id="advToggle">Advanced</div>
    </div>
</div>

<script>
    const idInput = document.getElementById('id');
    const generateBtn = document.getElementById('generateBtn');
    const statusEl = document.getElementById('status');

    const step1 = document.getElementById('step1');
    const step2 = document.getElementById('step2');
    const step3 = document.getElementById('step3');
    const line1 = document.getElementById('line1');
    const line2 = document.getElementById('line2');

    const advToggle = document.getElementById('advToggle');
    const advPanel = document.getElementById('advPanel');
    const advDownloadBtn = document.getElementById('advDownloadBtn');
    const advPackageBtn = document.getElementById('advPackageBtn');

    let advancedModeActive = false;
    advToggle.onclick = () => {
        advancedModeActive = !advancedModeActive;
        advPanel.style.display = advancedModeActive ? 'grid' : 'none';
        advToggle.innerText = advancedModeActive? 'Hide' : 'Advanced';
    };

    // Input event listener
    idInput.addEventListener('input', () => {
        const hasValue = !!idInput.value.trim();
        generateBtn.disabled = !hasValue;
        advDownloadBtn.disabled = !hasValue;
        advPackageBtn.disabled = true;
        resetProgress();
    });

    function setLoading(isLoading) {
        idInput.disabled = isLoading;
        generateBtn.disabled = isLoading;
        advDownloadBtn.disabled = isLoading;
        advPackageBtn.disabled = isLoading;

        if (isLoading) {
            statusEl.classList.add('loading');
        } else {
            statusEl.classList.remove('loading');
        }
    }

    function setStatus(text, type='') {
        statusEl.className = 'status';
        if (type) statusEl.classList.add(type);
        statusEl.textContent = text;
    }

    function resetProgress() {
        step1.className = 'step';
        step2.className = 'step';
        step3.className = 'step';
        line1.className = 'line';
        line2.className = 'line';
        statusEl.textContent = '';
        document.querySelectorAll('#downloadArea span').forEach(span => {
            span.classList.add('previous');
        });
    }

    function getPackId() {
        const val = idInput.value.trim();
        if (!val) {
            setStatus('Please enter Line Pack ID', 'error');
            return null;
        }
        return val;
    }
    
    // Main
    async function doPack() {
        const packId = getPackId();
        if (!packId) return;

        resetProgress();
        setLoading(true);

        try {
            // Download
            const downloadSuccess = await downloadFromLine(packId);
            if (!downloadSuccess) throw new Error('Download stage stopped processing.');

            // Package
            const packageSuccess = await packageSticker(packId);
            if (!packageSuccess) throw new Error('Packaging stage stopped processing.');

            // Complete
            line2.classList.add('completed');
            step3.className = 'step completed';
            setStatus('', 'success');

        } catch (error) {
            console.error(error);
            if (step1.classList.contains('active')) step1.classList.remove('active');
            if (step2.classList.contains('active')) step2.classList.remove('active');
            if (step3.classList.contains('active')) step3.classList.remove('active');
        } finally {
            setLoading(false);
        }
    }
    async function downloadFromLine(packId) {
        step1.className = 'step active';
        setStatus('', 'loading');

        const res = await fetch('/api/download', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ packId })
        });
        const data = await res.json();

        if (res.ok) {
            step1.className = 'step completed';
            line1.classList.add('completed');
            setStatus('', 'success');
            return true;
        } else {
            setStatus(data.message || JSON.stringify(data), 'error');
            return false;
        }
    }
    async function packageSticker(packId) {
        step2.className = 'step active';
        setStatus('', 'loading');

        const res = await fetch('/api/package', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ packId })
        });
        const data = await res.json();

        if (res.ok && data.result) {
            data.result.forEach(f => {
                const span = document.createElement('span');
                span.onclick = () => downloadWastickers(`${f.id}`, `${f.name}`);
                span.innerText = `${f.name}`;
                document.getElementById('downloadArea').appendChild(span);
            });

            step2.className = 'step completed';
            return true;
        } else {
            setStatus(data.message || JSON.stringify(data), 'error');
            return false;
        }
    }

    // Advanced
    async function manualDownload() {
        const packId = getPackId();
        if (!packId) return;

        resetProgress();
        setLoading(true);

        const success = await downloadFromLine(packId);
        setLoading(false);

        if (success) {
            advPackageBtn.disabled = false;
        }
    }

    async function manualPackage() {
        const packId = getPackId();
        if (!packId) return;

        setLoading(true);
        const success = await packageSticker(packId);

        if (success) {
            line2.classList.add('completed');
            step3.className = 'step completed';
            setStatus('', 'success');
        }
        setLoading(false);
    }

    function downloadWastickers(id, name) {
        fetch(`/api/wastickers?id=${encodeURIComponent(id)}`)
            .then(res => {
                if (!res.ok) throw new Error('Download failed');
                return res.blob();
            })
            .then(blob => {
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = name;
                document.body.appendChild(a);
                a.click();
                a.remove();
                URL.revokeObjectURL(url);
            })
            .catch((e) => {
                console.error(e);
                setStatus('Download error', 'error');
            });
    }
</script>
</body>
</html>
